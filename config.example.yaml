# ReconX Configuration
# Place this file at: ~/.config/reconx/config.yaml

# Path to file with target domains (one per line)
targets_file: "/path/to/targets.txt"

# Directories (leave empty for defaults: ~/.local/share/reconx/)
data_dir: ""
output_dir: ""
findings_dir: ""
logs_dir: ""

# Discord Webhook Notifications
discord:
  enabled: true
  webhooks:
    # Webhook for critical/high findings only
    critical: "https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN"
    # Webhook for cycle status updates
    status: "https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN"

# Tool Paths (auto-detected from $PATH if empty)
tools:
  subfinder: ""
  findomain: ""
  assetfinder: ""
  dnsx: ""
  nuclei: ""
  waymore: ""
  paramspider: ""
  gospider: ""
  uro: ""

# Recon Settings
recon:
  parallel_targets: 2        # concurrent recon workers
  subfinder_threads: 50

# DNS Resolution
dns:
  resolvers_file: ""         # auto: <data_dir>/resolvers.txt
  rate_limit: 200
  threads: 50

# Nuclei CVE Scan
nuclei:
  severity: ["critical", "high"]
  rate_limit: 50
  concurrency: 15
  bulk_size: 10
  timeout: 20                # per-request timeout (seconds)
  scan_timeout: 7200         # total scan timeout per target (seconds) — 2 hours
  exclude_ids: ["CVE-2021-35042"]

# DAST Settings
dast:
  rate_limit: 50
  concurrency: 10
  timeout: 20
  scan_timeout: 7200
  max_paramspider_subs: 10   # max subdomains to run paramspider on
  waymore_timeout: 1800      # 30 min (APIs have rate limits)
  paramspider_timeout: 300   # 5 minutes
  gospider_timeout: 600      # 10 min per domain
  gospider_concurrency: 5    # concurrent crawlers
  gospider_depth: 2          # crawl depth
  uro_timeout: 300           # 5 minutes

# Pipeline
pipeline:
  parallel_scans: 3          # concurrent scan workers
  cycle_delay: 60            # seconds between cycles

# Dashboard
dashboard:
  enabled: true
  host: "0.0.0.0"            # bind to all interfaces (remote access)
  port: 8080
  username: "admin"
  password: "changeme"       # CHANGE THIS!
  secret_key: ""             # auto-generated if empty

# Logging
logging:
  level: "info"              # debug, info, warn, error
  file: ""                   # auto: <logs_dir>/reconx.log
